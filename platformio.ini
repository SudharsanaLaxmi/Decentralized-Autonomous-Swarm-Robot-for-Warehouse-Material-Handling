# Firmware Configuration for ESP32-based Warehouse Robot
# Requires PlatformIO IDE/CLI (https://platformio.org)
#
# Build with: platformio run
# Upload with: platformio run -t upload
# Monitor with: platformio device monitor

[platformio]
default_envs = esp32_dev
src_dir = firmware/src
include_dir = firmware/include

[env:esp32_dev]
# Development environment with debugging enabled
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
build_flags =
    -DDEBUG_LEVEL=2
    -DWIFI_SSID=\"YOUR_SSID\"
    -DWIFI_PASSWORD=\"YOUR_PASSWORD\"
monitor_speed = 115200
upload_speed = 921600
upload_port = /dev/ttyUSB0  # Linux/Mac; COM4 on Windows
lib_deps =
    Wire
    SPI

[env:esp32_prod]
# Production environment with optimizations
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
build_flags =
    -DDEBUG_LEVEL=0
    -O3
    -DNDEBUG
monitor_speed = 115200

[env:esp32_testing]
# Testing environment with extended debug output
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
build_flags =
    -DDEBUG_LEVEL=3
    -DENABLE_TESTING=1
lib_deps =
    Unity
