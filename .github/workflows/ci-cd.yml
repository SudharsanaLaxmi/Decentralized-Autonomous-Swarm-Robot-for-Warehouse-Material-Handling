"""
GitHub Actions CI/CD Workflow

Automated testing, linting, and building on every push.
"""

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  
  # Python Testing & Quality Checks
  python-quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov black flake8 mypy isort pylint
    
    - name: Format check (Black)
      run: black --check vision/ communication/ testing/
    
    - name: Import sort check (isort)
      run: isort --check-only vision/ communication/ testing/
    
    - name: Lint (Pylint)
      run: pylint vision/ communication/ --disable=all --enable=E,F
      continue-on-error: true
    
    - name: Type check (Mypy)
      run: mypy vision/ communication/ --ignore-missing-imports
      continue-on-error: true
    
    - name: Run unit tests
      run: pytest testing/unit/ -v --tb=short
    
    - name: Run integration tests  
      run: pytest testing/integration/ -v --tb=short
    
    - name: Generate coverage report
      run: pytest testing/ --cov=vision --cov=communication --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  # Firmware Build & Test
  firmware-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Cache PlatformIO
      uses: actions/cache@v3
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-pio
    
    - name: Install PlatformIO
      run: |
        pip install platformio
        pio platform install espressif32
    
    - name: Build firmware (development)
      run: |
        cd firmware
        pio run -e esp32_dev
    
    - name: Build firmware (production)
      run: |
        cd firmware
        pio run -e esp32_prod
    
    - name: Check firmware size
      run: |
        cd firmware
        SIZE_DEV=$(stat -f%z .pio/build/esp32_dev/firmware.bin || stat -c%s .pio/build/esp32_dev/firmware.bin)
        echo "Development firmware size: $SIZE_DEV bytes"

  # Security Scanning
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install security tools
      run: |
        pip install bandit safety
    
    - name: Run Bandit (security linting)
      run: bandit -r vision/ communication/ -f json -o bandit-report.json
      continue-on-error: true
    
    - name: Check dependencies (Safety)
      run: safety check --json
      continue-on-error: true

  # Documentation
  docs:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Build API documentation
      run: |
        pip install pdoc
        pdoc vision communication --html --output-dir docs/api-generated

  # Release (on tags)
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [python-quality, firmware-build]
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Build distribution
      run: |
        pip install build wheel
        python -m build
    
    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body: |
          See CHANGELOG.md for details
        draft: false
        prerelease: false
